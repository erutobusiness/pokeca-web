<script type="module">
import init, { analyze_matchup, analyze_vs_meta, engine_version } from './pkg/pokeca_engine_rs.js';

let DATA = null;
let WASM_READY = false;

// Make functions available globally for onclick handlers
window.showDeckDetail = showDeckDetail;
window.showMatchup = showMatchup;
window.closePopup = closePopup;
window.analyzeFromCode = analyzeFromCode;
window.selectMetaDeck = selectMetaDeck;
window.switchTab = switchTab;
window.analyze1v1 = analyze1v1;

async function main() {
  // Load data and wasm in parallel
  const [dataRes] = await Promise.all([
    fetch('data.json').then(r => r.json()),
    init().then(() => { WASM_READY = true; }).catch(e => console.warn('Wasm init failed:', e)),
  ]);
  DATA = dataRes;

  renderMeta();
  renderRanking();
  renderTable();
  populateMetaDeckSelect();

  if (WASM_READY) {
    document.getElementById('engine-version').textContent = engine_version();
  } else {
    document.getElementById('engine-version').textContent = 'Wasm未ロード（事前計算データで表示中）';
  }
}

function renderMeta() {
  document.getElementById('meta').textContent =
    `${DATA.metadata.deckCount}デッキ / ${DATA.metadata.engine}エンジン / trials=${DATA.metadata.trials} / ${DATA.metadata.generatedAt}`;
}

function renderRanking() {
  const div = document.getElementById('ranking');
  div.innerHTML = '';
  DATA.cspRanking.forEach(entry => {
    const barColor = entry.fitness > 0.5 ? 'bg-emerald-500' : (entry.fitness > 0.45 ? 'bg-amber-500' : 'bg-red-500');
    const card = document.createElement('div');
    card.className = 'bg-surface rounded-xl p-3 cursor-pointer border-2 border-transparent hover:border-primary hover:-translate-y-0.5 transition-all duration-150 shadow-lg';
    card.dataset.deckId = entry.deckId;
    card.innerHTML = `
      <div class="flex items-baseline gap-2 mb-1">
        <span class="text-primary font-bold text-xl">#${entry.rank}</span>
        <span class="text-sm font-semibold truncate">${entry.name}</span>
      </div>
      <div class="text-xs text-slate-400">
        share ${(entry.share*100).toFixed(1)}% / fit ${(entry.fitness*100).toFixed(1)}%
      </div>
      <div class="h-1.5 bg-slate-700 rounded-full mt-2 overflow-hidden">
        <div class="h-full rounded-full ${barColor}" style="width:${Math.min(entry.fitness*200,100)}%"></div>
      </div>
    `;
    card.onclick = () => showDeckDetail(entry.deckId);
    div.appendChild(card);
  });
}

function showDeckDetail(deckId) {
  document.querySelectorAll('#ranking > div').forEach(c => {
    c.classList.toggle('border-primary', c.dataset.deckId === deckId);
    c.classList.toggle('bg-deep/30', c.dataset.deckId === deckId);
  });
  const info = DATA.deckInfo[deckId];
  const detail = document.getElementById('deck-detail');
  if (!info) { detail.classList.add('hidden'); return; }

  const attackersHtml = info.attackers.map(a => `
    <div class="bg-deep/40 rounded-lg p-3 min-w-[160px]">
      <div class="font-semibold text-sm">${a.name}</div>
      <div class="text-xs text-slate-400 mt-1">HP ${a.hp} / ${a.damage}dmg / prize ${a.prizeCost}</div>
      <div class="text-xs text-slate-500">type: ${a.attackType}</div>
    </div>
  `).join('');

  const wr = DATA.winrateMatrix[deckId] || {};
  const matchups = Object.entries(wr)
    .filter(([k]) => k !== deckId)
    .map(([k, v]) => ({ id: k, name: DATA.deckInfo[k]?.name || k, wr: v }))
    .sort((a, b) => b.wr - a.wr);

  const matchupHtml = matchups.map(m => {
    const cls = m.wr > 0.55 ? 'bg-emerald-500/20 text-emerald-400' : (m.wr < 0.45 ? 'bg-red-500/20 text-red-400' : 'bg-amber-500/10 text-amber-400');
    return `<span class="${cls} px-2 py-0.5 rounded text-xs inline-block m-0.5">vs ${m.name.substring(0,8)} ${(m.wr*100).toFixed(0)}%</span>`;
  }).join('');

  detail.innerHTML = `
    <div class="bg-surface rounded-xl p-5 shadow-lg fade-in">
      <h3 class="text-primary font-bold text-lg mb-3">${info.name}</h3>
      <div class="text-xs text-slate-400 mb-3">setup: ${info.setupTurns}T / weakness: ${info.weakness} / type: ${info.pokemonType}</div>
      <div class="flex gap-3 flex-wrap mb-4">${attackersHtml}</div>
      <div>${matchupHtml}</div>
    </div>
  `;
  detail.classList.remove('hidden');
}

function renderTable() {
  const table = document.getElementById('matchup-table');
  const ids = DATA.deckIds;
  const names = ids.map(id => DATA.deckInfo[id]?.name || id);

  let html = '<thead><tr><th class="bg-surface text-slate-400 text-xs p-2 border border-slate-700/50"></th>';
  names.forEach(n => html += `<th class="bg-surface text-primary text-xs p-2 border border-slate-700/50 font-medium">${n.substring(0,6)}</th>`);
  html += '</tr></thead><tbody>';

  ids.forEach((rowId, i) => {
    html += `<tr><td class="text-left font-semibold text-xs whitespace-nowrap p-2 bg-surface/50 border border-slate-700/50">${names[i]}</td>`;
    ids.forEach((colId, j) => {
      const wr = DATA.winrateMatrix[rowId]?.[colId];
      if (i === j) {
        html += '<td class="bg-bg text-slate-600 p-2 border border-slate-700/50 text-center">-</td>';
      } else if (wr !== undefined) {
        const pct = (wr*100).toFixed(0);
        let cls;
        if (wr > 0.55) cls = 'bg-emerald-500/15 text-emerald-400';
        else if (wr < 0.45) cls = 'bg-red-500/15 text-red-400';
        else cls = 'bg-amber-500/10 text-amber-400';
        html += `<td class="${cls} p-2 border border-slate-700/50 text-center cursor-pointer hover:ring-2 hover:ring-primary transition-shadow" onclick="showMatchup('${rowId}','${colId}')">${pct}%</td>`;
      } else {
        html += '<td class="p-2 border border-slate-700/50 text-center text-slate-600">-</td>';
      }
    });
    html += '</tr>';
  });
  html += '</tbody>';
  table.innerHTML = html;
}

function showMatchup(aId, bId) {
  const a = DATA.deckInfo[aId];
  const b = DATA.deckInfo[bId];
  const wr = DATA.winrateMatrix[aId]?.[bId];
  if (!a || !b || wr === undefined) return;

  const wrB = 1 - wr;
  const winColor = wr > 0.5 ? 'text-emerald-400' : 'text-red-400';
  const content = document.getElementById('popup-content');
  content.innerHTML = `
    <h3 class="text-primary font-bold text-lg mb-4">${a.name} vs ${b.name}</h3>
    <div class="text-center text-4xl font-bold my-4 ${winColor}">
      ${(wr*100).toFixed(1)}% <span class="text-slate-500 text-2xl">-</span> ${(wrB*100).toFixed(1)}%
    </div>
    <table class="w-full text-sm mt-4">
      <thead><tr>
        <th class="text-left text-slate-500 pb-2"></th>
        <th class="text-center text-slate-300 pb-2">${a.name.substring(0,10)}</th>
        <th class="text-center text-slate-300 pb-2">${b.name.substring(0,10)}</th>
      </tr></thead>
      <tbody class="text-slate-300">
        <tr class="border-t border-slate-700"><td class="py-1.5 text-slate-400">メインHP</td><td class="text-center">${a.attackers[0]?.hp || '?'}</td><td class="text-center">${b.attackers[0]?.hp || '?'}</td></tr>
        <tr class="border-t border-slate-700"><td class="py-1.5 text-slate-400">ダメージ</td><td class="text-center">${a.attackers[0]?.damage || '?'}</td><td class="text-center">${b.attackers[0]?.damage || '?'}</td></tr>
        <tr class="border-t border-slate-700"><td class="py-1.5 text-slate-400">prize</td><td class="text-center">${a.attackers[0]?.prizeCost || '?'}</td><td class="text-center">${b.attackers[0]?.prizeCost || '?'}</td></tr>
        <tr class="border-t border-slate-700"><td class="py-1.5 text-slate-400">setup</td><td class="text-center">${a.setupTurns}T</td><td class="text-center">${b.setupTurns}T</td></tr>
        <tr class="border-t border-slate-700"><td class="py-1.5 text-slate-400">弱点</td><td class="text-center">${a.weakness}</td><td class="text-center">${b.weakness}</td></tr>
      </tbody>
    </table>
  `;
  document.getElementById('popup').classList.remove('hidden');
  document.getElementById('popup').classList.add('fade-in');
  document.getElementById('overlay').classList.remove('hidden');
}

function closePopup() {
  document.getElementById('popup').classList.add('hidden');
  document.getElementById('overlay').classList.add('hidden');
}


// =========================================================================
// Deck Code Analysis
// =========================================================================

async function fetchDeckFromCode(code) {
  const url = `https://www.pokemon-card.com/deck/confirm.html/deckID/${code}/`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const html = await res.text();

  // Parse hidden inputs for card IDs and counts
  const categories = {};
  const hiddenFields = {
    deck_pke: 'pokemon', deck_gds: 'goods', deck_tool: 'tool',
    deck_sup: 'supporter', deck_sta: 'stadium', deck_ene: 'energy',
  };
  for (const [field, cat] of Object.entries(hiddenFields)) {
    const match = html.match(new RegExp(`name="${field}"[^>]*value="([^"]*)"`));
    if (match && match[1]) {
      categories[cat] = match[1].split('-').filter(Boolean).map(entry => {
        const [id, count] = entry.split('_');
        return { id, count: parseInt(count) || 1 };
      });
    }
  }

  // Parse card names from inline JS
  const cardNames = {};
  const nameRegex = /PCGDECK\.searchItemName\[(\d+)\]='([^']+)'/g;
  let m;
  while ((m = nameRegex.exec(html)) !== null) {
    cardNames[m[1]] = m[2].replace(/\(.*\)$/, '').trim();
  }

  // Build card list
  const cards = [];
  for (const [cat, entries] of Object.entries(categories)) {
    for (const entry of entries) {
      cards.push({
        id: entry.id,
        name: cardNames[entry.id] || `card_${entry.id}`,
        count: entry.count,
        category: cat,
      });
    }
  }
  return cards;
}

function buildProfileFromCards(cards) {
  // Simple profile builder: extract Pokemon as attackers
  const attackers = [];
  const pokemon = cards.filter(c => c.category === 'pokemon');
  const energyCount = cards.filter(c => c.category === 'energy').reduce((s, c) => s + c.count, 0);
  const supporterCount = cards.filter(c => c.category === 'supporter').reduce((s, c) => s + c.count, 0);

  // Try to match against known cards in deckProfiles
  const knownCards = {};
  if (DATA.deckProfiles) {
    for (const profile of Object.values(DATA.deckProfiles)) {
      for (const atk of profile.attackers) {
        knownCards[atk.name] = atk;
      }
    }
  }

  for (const poke of pokemon) {
    const known = knownCards[poke.name];
    if (known) {
      attackers.push({ ...known, count: poke.count });
    } else {
      // Default values for unknown Pokemon
      attackers.push({
        name: poke.name,
        hp: 100,
        damage: 80,
        energy_cost: 2,
        prize_cost: 1,
        attack_type: 'unknown',
        count: poke.count,
      });
    }
  }

  // Sort by estimated power (HP * damage) descending, take top 6
  attackers.sort((a, b) => (b.hp * b.damage) - (a.hp * a.damage));

  return {
    name: 'カスタムデッキ',
    attackers: attackers.slice(0, 6),
    setup_turns: attackers.some(a => a.hp >= 250) ? 2 : 1,
    energy_accel: 0,
    weakness: 'none',
    composition: {
      energy: energyCount || 10,
      supporters: supporterCount || 12,
      items: 16,
      pokemon: pokemon.reduce((s, c) => s + c.count, 0),
      stadiums: 2,
    },
    boss_count: 2,
    belt_count: 0,
    bench_size: 5,
  };
}

async function analyzeFromCode() {
  const code = document.getElementById('deck-code-input').value.trim();
  if (!/^[A-Za-z0-9]{6}-[A-Za-z0-9]{6}-[A-Za-z0-9]{6}$/.test(code)) {
    showStatus('デッキコードの形式が正しくありません（XXXXXX-XXXXXX-XXXXXX）', 'error');
    return;
  }

  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  showStatus('デッキ情報を取得中...', 'loading');

  try {
    const cards = await fetchDeckFromCode(code);
    if (cards.length === 0) throw new Error('カードリストの取得に失敗しました');

    showStatus(`${cards.reduce((s,c) => s+c.count, 0)}枚のデッキを取得しました。分析中...`, 'loading');

    const profile = buildProfileFromCards(cards);
    await runAnalysis(profile);
  } catch (e) {
    showStatus(`エラー: ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
  }
}

function selectMetaDeck() {
  const id = document.getElementById('meta-deck-select').value;
  if (!id) return;

  // メタデッキ同士は事前計算勝率を使う（Pythonフルエンジンの正確な結果）
  const precomputed = DATA.winrateMatrix[id];
  if (precomputed) {
    const results = DATA.deckIds
      .filter(did => did !== id)
      .map(did => ({ id: did, winrate: precomputed[did] ?? 0.5 }));

    showStatus(`事前計算済み勝率を表示中（${DATA.metadata.engine}エンジン, trials=${DATA.metadata.trials}）`, 'success');
    const profile = DATA.deckFullConfigs?.[id] || {name: DATA.deckInfo[id]?.name};
    renderAnalysisResults(profile, results);
    return;
  }

  // 事前計算がなければWasmで計算（フルデッキデータ使用）
  const fullConfig = DATA.deckFullConfigs?.[id];
  if (fullConfig) {
    runAnalysis(fullConfig);
  }
}

async function runAnalysis(deckData) {
  if (!WASM_READY) {
    showStatus('Wasmエンジンが利用できません。事前計算データのみ表示中。', 'error');
    return;
  }

  const trials = 500;
  showStatus(`Wasmエンジンで${DATA.deckIds.length}デッキとの勝率を計算中（${trials}trials/pair）...`, 'loading');

  // Run in next frame to allow UI update
  await new Promise(r => setTimeout(r, 10));

  try {
    // メタデッキ: フルデッキデータがあればそれを使う
    const metaEntries = DATA.deckIds.map(id => {
      const entry = { id };
      if (DATA.deckFullConfigs?.[id]) {
        entry.deck = DATA.deckFullConfigs[id];
      }
      return entry;
    });

    const myJson = JSON.stringify(deckData);
    const metaJson = JSON.stringify(metaEntries);
    const start = performance.now();
    const resultsJson = analyze_vs_meta(myJson, metaJson, trials);
    const elapsed = performance.now() - start;

    const results = JSON.parse(resultsJson);
    showStatus(`完了 (${elapsed.toFixed(0)}ms, ${metaEntries.length * trials}ゲーム)`, 'success');
    renderAnalysisResults(deckData, results);
  } catch (e) {
    showStatus(`シミュレーションエラー: ${e}`, 'error');
  }
}

function showStatus(msg, type) {
  const el = document.getElementById('analysis-status');
  el.classList.remove('hidden');
  const colors = { loading: 'text-slate-400', error: 'text-red-400', success: 'text-emerald-400' };
  el.className = `text-sm ${colors[type] || 'text-slate-400'}`;
  el.textContent = msg;
}

// =========================================================================
// マッチアップ理由生成
// =========================================================================

const TYPE_NAMES = {fire:'炎',water:'水',grass:'草',lightning:'雷',psychic:'超',fighting:'闘',dark:'悪',steel:'鋼',dragon:'龍',colorless:'無'};

function analyzeMatchupReason(myDeck, oppId) {
  const oppDeck = DATA.deckFullConfigs?.[oppId];
  const oppInfo = DATA.deckInfo?.[oppId];
  if (!oppDeck || !oppInfo) return '';

  const reasons = [];

  // 自分のアタッカー情報
  const myAttackers = (myDeck.cards || []).filter(c => c.kind === 'pokemon' && c.attacks?.some(a => a.damage > 0));
  const oppAttackers = (oppDeck.cards || []).filter(c => c.kind === 'pokemon' && c.attacks?.some(a => a.damage > 0));

  if (!myAttackers.length || !oppAttackers.length) return '';

  const myMain = myAttackers.reduce((best, c) => (!best || (c.attacks[0]?.damage||0) > (best.attacks[0]?.damage||0)) ? c : best, null);
  const oppMain = oppAttackers.reduce((best, c) => (!best || (c.attacks[0]?.damage||0) > (best.attacks[0]?.damage||0)) ? c : best, null);

  if (!myMain || !oppMain) return '';

  const myDmg = myMain.attacks[0]?.damage || 0;
  const oppDmg = oppMain.attacks[0]?.damage || 0;
  const myHp = myMain.hp;
  const oppHp = oppMain.hp;

  // タイプ相性
  const myType = myMain.attack_type || '';
  const oppWeak = oppMain.weakness || '';
  const oppType = oppMain.attack_type || '';
  const myWeak = myMain.weakness || '';

  if (myType && myType === oppWeak) {
    reasons.push(`弱点: ${TYPE_NAMES[myType]||myType}攻撃が相手の弱点(x2)`);
  }
  if (oppType && oppType === myWeak) {
    reasons.push(`弱点被り: 相手の${TYPE_NAMES[oppType]||oppType}攻撃がこちらの弱点`);
  }

  // KO効率
  const myEffDmg = (myType && myType === oppWeak) ? myDmg * 2 : myDmg;
  const oppEffDmg = (oppType && oppType === myWeak) ? oppDmg * 2 : oppDmg;
  const hitsToKoOpp = Math.ceil(oppHp / Math.max(myEffDmg, 1));
  const hitsToKoMe = Math.ceil(myHp / Math.max(oppEffDmg, 1));

  if (hitsToKoOpp === 1) reasons.push(`1発KO: ${myDmg}dmg → HP${oppHp}`);
  else reasons.push(`${hitsToKoOpp}発KO: ${myEffDmg}dmg → HP${oppHp}`);

  if (hitsToKoMe === 1) reasons.push(`被1発KO: ${oppDmg}dmg → HP${myHp}`);

  // サイドレース
  const myPrize = myMain.prize_cost || 2;
  const oppPrize = oppMain.prize_cost || 2;
  const needKOs = Math.ceil(6 / oppPrize);
  const theyNeedKOs = Math.ceil(6 / myPrize);
  if (needKOs !== theyNeedKOs) {
    reasons.push(`サイドレース: こちら${needKOs}体KO必要, 相手${theyNeedKOs}体`);
  }

  // setup差
  const mySetup = myDeck.setup_turns || 0;
  const oppSetup = oppDeck.setup_turns || 0;
  if (mySetup < oppSetup) reasons.push(`速度有利: setup ${mySetup}T vs ${oppSetup}T`);
  else if (mySetup > oppSetup) reasons.push(`速度不利: setup ${mySetup}T vs ${oppSetup}T`);

  // 特殊効果
  if (myMain.has_immunity) reasons.push('ex無効特性持ち');
  if (myMain.attacks[0]?.bench_snipe > 0) reasons.push(`ベンチ狙撃${myMain.attacks[0].bench_snipe}`);

  return reasons.slice(0, 3).join(' / ');
}

function renderAnalysisResults(deckData, results) {
  const container = document.getElementById('analysis-results');
  const barsContainer = document.getElementById('matchup-bars');
  container.classList.remove('hidden');

  results.sort((a, b) => b.winrate - a.winrate);

  let barsHtml = '';
  let totalWeightedWr = 0;
  let totalWeight = 0;

  for (const r of results) {
    const name = DATA.deckInfo[r.id]?.name || r.id;
    const pct = (r.winrate * 100).toFixed(1);
    const barWidth = Math.max(r.winrate * 100, 2);
    const share = DATA.metaShares?.[r.id] || 0;
    totalWeightedWr += r.winrate * share;
    totalWeight += share;

    let barColor, textColor;
    if (r.winrate > 0.55) { barColor = 'bg-emerald-500'; textColor = 'text-emerald-400'; }
    else if (r.winrate < 0.45) { barColor = 'bg-red-500'; textColor = 'text-red-400'; }
    else { barColor = 'bg-amber-500'; textColor = 'text-amber-400'; }

    const reason = analyzeMatchupReason(deckData, r.id);

    barsHtml += `
      <div class="mb-2">
        <div class="flex items-center gap-2">
          <span class="text-xs text-slate-400 w-24 truncate text-right">${name}</span>
          <div class="flex-1 h-5 bg-slate-700/50 rounded overflow-hidden">
            <div class="h-full ${barColor}/30 bar-chart-bar rounded" style="width:${barWidth}%"></div>
          </div>
          <span class="text-xs font-semibold w-14 text-right ${textColor}">${pct}%</span>
        </div>
        ${reason ? `<div class="ml-28 text-[10px] text-slate-500 mt-0.5">${reason}</div>` : ''}
      </div>
    `;
  }

  barsContainer.innerHTML = barsHtml;

  const fitness = totalWeight > 0 ? totalWeightedWr / totalWeight : 0;
  document.getElementById('fitness-score').textContent = `${(fitness * 100).toFixed(1)}%`;
}

// =========================================================================
// 1v1 Analysis
// =========================================================================

async function analyze1v1() {
  const btn = document.getElementById('analyze-1v1-btn');
  btn.disabled = true;

  try {
    const deckA = await resolveDeck('a');
    const deckB = await resolveDeck('b');
    if (!deckA || !deckB) return;

    if (!WASM_READY) {
      show1v1Status('Wasmエンジンが利用できません', 'error');
      return;
    }

    show1v1Status('シミュレーション中...', 'loading');
    await new Promise(r => setTimeout(r, 10));

    const trials = 2000;
    const start = performance.now();
    const wr = analyze_matchup(JSON.stringify(deckA.data), JSON.stringify(deckB.data), trials);
    const elapsed = performance.now() - start;

    const wrPct = (wr * 100).toFixed(1);
    const wrBPct = ((1 - wr) * 100).toFixed(1);
    show1v1Status(`完了 (${elapsed.toFixed(0)}ms, ${trials}ゲーム)`, 'success');

    // 理由生成
    const reasons1v1 = analyze1v1Reasons(deckA.data, deckB.data);

    const winColor = wr > 0.5 ? 'text-emerald-400' : 'text-red-400';
    document.getElementById('result-1v1').classList.remove('hidden');
    document.getElementById('result-1v1').innerHTML = `
      <div class="text-center">
        <div class="flex justify-center items-center gap-4 mb-2">
          <span class="text-sm font-semibold">${deckA.name}</span>
          <span class="text-slate-500">vs</span>
          <span class="text-sm font-semibold">${deckB.name}</span>
        </div>
        <div class="text-4xl font-bold ${winColor} my-3">
          ${wrPct}% <span class="text-slate-500 text-2xl">-</span> ${wrBPct}%
        </div>
        <div class="text-xs text-slate-500 mt-2">${trials}回シミュレーション</div>
        ${reasons1v1 ? `<div class="mt-3 p-3 bg-deep/40 rounded-lg text-left text-xs text-slate-400 space-y-1">${reasons1v1}</div>` : ''}
      </div>
    `;
  } catch (e) {
    show1v1Status(`エラー: ${e.message || e}`, 'error');
  } finally {
    btn.disabled = false;
  }
}
async function resolveDeck(side) {
  const codeEl = document.getElementById(`deck-${side}-code`);
  const selectEl = document.getElementById(`deck-${side}-select`);
  const code = codeEl.value.trim();
  const selectId = selectEl.value;

  if (code && /^[A-Za-z0-9]{6}-[A-Za-z0-9]{6}-[A-Za-z0-9]{6}$/.test(code)) {
    show1v1Status(`デッキ${side.toUpperCase()}を取得中...`, 'loading');
    const cards = await fetchDeckFromCode(code);
    const profile = buildProfileFromCards(cards);
    return { name: `カスタム(${code.substring(0,6)})`, data: profile };
  } else if (selectId && DATA.deckFullConfigs?.[selectId]) {
    return { name: DATA.deckInfo[selectId]?.name || selectId, data: DATA.deckFullConfigs[selectId] };
  } else {
    show1v1Status(`デッキ${side.toUpperCase()}: コードまたは環境デッキを指定してください`, 'error');
    return null;
  }
}

function analyze1v1Reasons(deckA, deckB) {
  const getMain = (deck) => {
    const pokes = (deck.cards || []).filter(c => c.kind === 'pokemon' && c.attacks?.some(a => a.damage > 0));
    return pokes.reduce((best, c) => (!best || (c.attacks[0]?.damage||0) > (best.attacks[0]?.damage||0)) ? c : best, null);
  };
  const a = getMain(deckA);
  const b = getMain(deckB);
  if (!a || !b) return '';

  const lines = [];
  const aDmg = a.attacks[0]?.damage || 0;
  const bDmg = b.attacks[0]?.damage || 0;

  // 弱点
  if (a.attack_type && a.attack_type === b.weakness) lines.push(`<div>A側有利: ${TYPE_NAMES[a.attack_type]||a.attack_type}攻撃がB側の弱点(x2ダメージ)</div>`);
  if (b.attack_type && b.attack_type === a.weakness) lines.push(`<div>B側有利: ${TYPE_NAMES[b.attack_type]||b.attack_type}攻撃がA側の弱点(x2ダメージ)</div>`);

  // KO効率
  const aEff = (a.attack_type && a.attack_type === b.weakness) ? aDmg*2 : aDmg;
  const bEff = (b.attack_type && b.attack_type === a.weakness) ? bDmg*2 : bDmg;
  lines.push(`<div>A→B: ${aEff}dmg, ${Math.ceil(b.hp/Math.max(aEff,1))}発KO (HP${b.hp})</div>`);
  lines.push(`<div>B→A: ${bEff}dmg, ${Math.ceil(a.hp/Math.max(bEff,1))}発KO (HP${a.hp})</div>`);

  // サイドレース
  const aNeeds = Math.ceil(6 / (b.prize_cost||2));
  const bNeeds = Math.ceil(6 / (a.prize_cost||2));
  if (aNeeds !== bNeeds) lines.push(`<div>サイドレース: A側${aNeeds}体KO必要, B側${bNeeds}体</div>`);

  // setup
  const aSetup = deckA.setup_turns || 0;
  const bSetup = deckB.setup_turns || 0;
  if (aSetup !== bSetup) lines.push(`<div>セットアップ: A=${aSetup}T, B=${bSetup}T</div>`);

  return lines.join('');
}

function show1v1Status(msg, type) {
  const el = document.getElementById('status-1v1');
  el.classList.remove('hidden');
  const colors = { loading: 'text-slate-400', error: 'text-red-400', success: 'text-emerald-400' };
  el.className = `text-sm mt-2 ${colors[type] || 'text-slate-400'}`;
  el.textContent = msg;
}

function populateMetaDeckSelect() {
  for (const selectId of ['meta-deck-select', 'deck-a-select', 'deck-b-select']) {
    const select = document.getElementById(selectId);
    if (!select) continue;
    DATA.deckIds.forEach(id => {
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = DATA.deckInfo[id]?.name || id;
      select.appendChild(opt);
    });
  }
}
